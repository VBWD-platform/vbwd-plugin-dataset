name: Tests

on:
  push:
    branches: ['*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  ci:
    name: CI — dataset (lint + unit)
    runs-on: ubuntu-latest

    steps:
      - name: Clone vbwd-backend
        uses: actions/checkout@v4
        with:
          repository: VBWD-platform/vbwd-backend
          ref: main
          path: vbwd-backend

      - name: Clone plugin
        uses: actions/checkout@v4
        with:
          path: vbwd-backend/plugins/dataset

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: vbwd-backend/requirements.txt

      - name: Install Python dependencies
        run: pip install -r vbwd-backend/requirements.txt

      - name: Style check — Black
        run: black --check --diff vbwd-backend/plugins/dataset/ --exclude='/(\.git|__pycache__|\.pytest_cache)/'

      - name: Style check — Flake8
        run: flake8 vbwd-backend/plugins/dataset/ --max-line-length=120 --extend-ignore=E203,W503 --exclude=.git,__pycache__,.pytest_cache

      - name: Style check — Mypy
        run: mypy vbwd-backend/plugins/dataset/dataset/ --ignore-missing-imports --no-error-summary --python-version=3.11 || true

      - name: Run unit tests
        working-directory: vbwd-backend
        run: |
          if [ -d "plugins/dataset/tests/unit" ]; then
            python -m pytest plugins/dataset/tests/unit/ -v --tb=short
          else
            echo "No unit tests yet"
          fi

  integration:
    name: Integration — dataset
    needs: ci
    runs-on: ubuntu-latest

    steps:
      - name: Clone vbwd-backend
        uses: actions/checkout@v4
        with:
          repository: VBWD-platform/vbwd-backend
          ref: main
          path: vbwd-backend

      - name: Clone plugin
        uses: actions/checkout@v4
        with:
          path: vbwd-backend/plugins/dataset

      - name: Clone backend dependencies (subscription, cms)
        run: |
          for plugin in subscription cms; do
            git clone --depth=1 -q https://github.com/VBWD-platform/vbwd-plugin-${plugin}.git vbwd-backend/plugins/${plugin} || true
          done

      - name: Create plugins.json (enable dataset + dependencies)
        run: |
          echo '{"plugins":{"dataset":{"enabled":true,"version":"1.0.0","source":"local"},"subscription":{"enabled":true,"version":"1.0.0","source":"local"},"cms":{"enabled":true,"version":"1.0.0","source":"local"}}}' > vbwd-backend/plugins/plugins.json

      - name: Start services
        working-directory: vbwd-backend
        run: docker compose up -d --build

      - name: Wait for API
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:5000/api/v1/health > /dev/null 2>&1 && break
            sleep 2
          done
          curl -sf http://localhost:5000/api/v1/health || exit 1

      - name: Seed test data
        working-directory: vbwd-backend
        run: docker compose exec -T api flask seed-test-data || true

      - name: Run integration tests
        working-directory: vbwd-backend
        run: |
          if [ -d "plugins/dataset/tests/integration" ]; then
            docker compose run --rm test pytest plugins/dataset/tests/integration/ -v --tb=short
          else
            echo "No integration tests yet — skipping"
          fi

      - name: Cleanup
        if: always()
        working-directory: vbwd-backend
        run: docker compose down -v
